services:
  n8n:
    image: n8nio/n8n:2.16.1
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: "27Af3Lte7dqWNJubTuS42E1xXaPTB91m"
      N8N_HOST: e2e-tpl-n8n-postgres.local
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://e2e-tpl-n8n-postgres.local/
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18080:5678"
    networks:
      - simpledeploy-public
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: "27Af3Lte7dqWNJubTuS42E1xXaPTB91m"
      POSTGRES_DB: n8n
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
volumes:
  n8n-data: {}
  pgdata: {}
networks:
  simpledeploy-public:
    external: true
    name: simpledeploy-public
