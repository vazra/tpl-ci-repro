services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-v2.20.2
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://umami:bztc9WjYRTyu8yUzVQ7JWKj9FH21CJSR@db:5432/umami"
      DATABASE_TYPE: postgresql
      APP_SECRET: "9c3df35f340ccac09d2f520de83807ef"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18080:3000"
    networks:
      - simpledeploy-public
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: "bztc9WjYRTyu8yUzVQ7JWKj9FH21CJSR"
      POSTGRES_DB: umami
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
volumes:
  pgdata: {}
networks:
  simpledeploy-public:
    external: true
    name: simpledeploy-public
